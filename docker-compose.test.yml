services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arin
      POSTGRES_PASSWORD: arin
      POSTGRES_DB: arin_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arin -d arin_test"]
      interval: 2s
      timeout: 3s
      retries: 15
