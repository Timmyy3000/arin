services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arin
      POSTGRES_PASSWORD: arin
      POSTGRES_DB: arin
    ports:
      - "5432:5432"
    volumes:
      - arin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arin -d arin"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://arin:arin@postgres:5432/arin
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-please-change-me-32-chars-minimum}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DEFAULT_ORG_NAME: ${DEFAULT_ORG_NAME:-Default}
      DEFAULT_ORG_SLUG: ${DEFAULT_ORG_SLUG:-default}
      CRON_SECRET: ${CRON_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3000:3000"

volumes:
  arin_pg_data:
